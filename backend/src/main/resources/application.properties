spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8081
app.seed-admin=${APP_SEED_ADMIN:false}
app.seed-admin-phone=${APP_SEED_ADMIN_PHONE:}
app.seed-admin-username=${APP_SEED_ADMIN_USERNAME:}
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:}


security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

springdoc.api-docs.path=/v3/api-docs
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.security.public-docs-enabled=${APP_SECURITY_PUBLIC_DOCS_ENABLED:false}
app.security.rate-limit.login.max-attempts=${APP_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
app.security.rate-limit.login.window-minutes=${APP_RATE_LIMIT_LOGIN_WINDOW_MINUTES:15}
app.security.rate-limit.verification.max-attempts=${APP_RATE_LIMIT_VERIFICATION_MAX_ATTEMPTS:5}
app.security.rate-limit.verification.window-minutes=${APP_RATE_LIMIT_VERIFICATION_WINDOW_MINUTES:15}
app.security.rate-limit.password-reset.max-attempts=${APP_RATE_LIMIT_PASSWORD_RESET_MAX_ATTEMPTS:3}
app.security.rate-limit.password-reset.window-minutes=${APP_RATE_LIMIT_PASSWORD_RESET_WINDOW_MINUTES:15}

app.storage.upload-dir=${APP_UPLOAD_DIR:uploads}
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.sender-name=${APP_SMS_SENDER:Khadamat MR}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.api-key=${TWILIO_API_KEY:}
app.sms.twilio.api-secret=${TWILIO_API_SECRET:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.sms.twilio.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID:}


