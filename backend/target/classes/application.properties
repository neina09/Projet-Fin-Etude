spring.application.name=ommalak-backend

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ommalak_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=OmmalakSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000

# ── OTP ───────────────────────────────────────────────────────────────────────
# Set to true to print OTP to console instead of sending SMS (dev mode)
app.otp.dev-mode=true
app.otp.expiry-minutes=10

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
